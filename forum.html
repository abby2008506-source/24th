<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>觀點交流板 - 第24期進階培育營</title>
    <style>
        /* 沿用海報的科技深藍色 */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif; 
            margin: 0; 
            background-color: #0b2545; 
            color: #ffffff; 
            text-align: center; 
        }
        header { 
            background: linear-gradient(135deg, #134074, #0b2545); 
            padding: 50px 20px; 
            border-bottom: 4px solid #edf2f4; 
        }
        header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }
        .container { 
            max-width: 700px; 
            margin: 40px auto; 
            padding: 0 20px; 
            text-align: left; 
        }
        
        .intro-box {
            background: rgba(255, 255, 255, 0.1);
            border-left: 5px solid #e9c46a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
        }
        .intro-box h2 {
            margin-top: 0;
            color: #e9c46a;
        }
        .intro-box p {
            margin: 5px 0;
            line-height: 1.6;
        }

        /* Slido 專屬巨型按鈕區域 */
        .slido-container {
            background: #ffffff;
            padding: 40px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            margin-bottom: 40px;
        }
        
        /* 模擬海報撞色設計的 Slido 按鈕 */
        .slido-btn {
            display: inline-block;
            background: linear-gradient(135deg, #f4a261, #e76f51); /* 海報亮橘色漸層 */
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(231, 111, 81, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #ffffff;
        }
        
        .slido-btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 12px 25px rgba(231, 111, 81, 0.6);
            background: linear-gradient(135deg, #e76f51, #f4a261);
        }

        .slido-tip {
            color: #666666;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: bold;
        }
        
        .btn-wrapper {
            text-align: center;
        }
        .back-btn { 
            display: inline-block; 
            margin-top: 20px; 
            padding: 12px 35px; 
            background: #e9c46a; 
            color: #0b2545; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: #f4a261;
        }
    </style>
</head>
<body>

    <header>
        <h1>💬 觀點交流板</h1>
        <p>第 24 期進階培育營 ｜ 即時互動提問與觀點分享</p>
    </header>

    <div class="container">
        
        <!-- 交流板規則說明 -->
        <div class="intro-box">
            <h2>📢 發言守則</h2>
            <p>1. 歡迎點擊下方按鈕，針對課程內容提出你的疑問或獨到觀點。</p>
            <p>2. 本系統採用 Slido，學員<b>完全不需註冊登入</b>即可匿名發言。</p>
            <p>3. 看到其他同學提出精彩的觀點，可以幫他<b>點擊讚（按讚）</b>，讓好問題被看見！</p>
        </div>

        <!-- Slido 巨型按鈕區塊 -->
        <div class="slido-container">
            <!-- 教學：請將 href="#" 裡面的 # 換成你專屬的 Slido 房間網址 -->
            <a href="https://admin.sli.do/event/hprX7ca8dvdv6VgapFLw8p/polls" target="_blank" class="slido-btn">🚀 點此開啟 Slido 觀點交流板</a>
            <p class="slido-tip">💡 提示：點擊後會自動開啟新視窗跳轉至 Slido 互動專區</p>
        </div>

        <div class="btn-wrapper">
            <a href="index.html" class="back-btn">← 返回首頁</a>
        </div>
    </div>

</body>
</html>
