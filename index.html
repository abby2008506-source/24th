<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育部高級中等學校學生新世紀領導人才第24期進階培育營</title>
    <style>
        /* 提取海報的背景深藍色與字體 */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            background-color: #0b2545; 
            color: #ffffff; 
            text-align: center; 
        }
        
        /* 頂部橫幅：模擬海報的漸層色與活潑氛圍 */
        header { 
            background: linear-gradient(135deg, #134074, #0b2545); 
            padding: 60px 20px; 
            border-bottom: 5px solid #f4a261; /* 海報上的亮橘色線條 */
            position: relative;
        }
        
        /* 模擬海報的主標題樣式 */
        header h1 { 
            font-size: 2.6rem; 
            margin: 0; 
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #134074, 5px 5px 0px #0b2545;
        }
        
        header .subtitle {
            font-size: 1.3rem;
            color: #f4a261; /* 橘色 */
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        header .info-tag {
            display: inline-block;
            background-color: #e9c46a; /* 亮黃色 */
            color: #0b2545;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
        }
        
        .container { 
            max-width: 1000px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }
        
        /* 網格系統：呼應海報上的方塊與虛擬實境方格 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        
        /* 點選方塊：採用乾淨的白色半透明卡片，強調對比度 */
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            border: 2px solid #e9c46a; /* 黃色邊框 */
            border-radius: 16px; 
            padding: 45px 20px; 
            text-decoration: none; 
            color: #0b2545; /* 深藍色字體 */
            font-weight: bold; 
            font-size: 1.4rem; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* 滑鼠懸停：卡片會微微向上浮起，且邊框與文字變成海報亮橘色 */
        .card:hover { 
            transform: translateY(-8px) scale(1.02); 
            border-color: #f4a261; 
            color: #f4a261;
            background: #ffffff;
            box-shadow: 0 12px 20px rgba(244, 162, 97, 0.3);
        }
        
        /* 頁尾資訊欄：放上主辦與承辦單位 */
        footer { 
            margin-top: 80px; 
            padding: 30px; 
            font-size: 0.95rem; 
            color: #a3b18a; 
            background: #134074; 
            border-top: 1px solid rgba(255,255,255,0.1);
            line-height: 1.8;
        }
        footer span {
            color: #e9c46a;
        }
    </style>
</head>
<body>

    <header>
        <h1>新世紀領導人才<br>第 24 期進階培育營</h1>
        <div class="subtitle">教育部 高級中等學校學生</div>
        <div class="info-tag">南區 ｜ 115.07.06 - 07.10</div>
    </header>

    <div class="container">
        <!-- 點選方塊區域 -->
        <div class="grid">
            <a href="rules.html" class="card">📜 營期規範</a>
            <a href="journal.html" class="card">📰 每日營刊</a>
            <a href="mission.html" class="card">💡 思辨任務</a>
            <a href="photos.html" class="card">📸 相片集錦</a>
            <a href="teachers.html" class="card">💬 老師的話</a>
            <a href="feedback.html" class="card">✏️ 回饋五四三</a>
        </div>
    </div>

    <footer>
        <p>【主辦單位】 教育部國民及學前教育署</p>
        <p>【承辦單位】 南區 - <span>國立竹山高級中學</span></p>
    </footer>

</body>
</html>
