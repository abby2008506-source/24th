<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新世紀領導人才培育營</title>
    <style>
        /* 全域風格設計 */
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; color: #333; text-align: center; }
        header { background: #1a365d; color: white; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        /* 點選方塊 RWD 網格排版 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        
        /* 點選方塊卡片樣式 */
        .card { background: white; border-radius: 8px; padding: 40px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; color: #1a365d; font-weight: bold; font-size: 1.3rem; transition: transform 0.2s, box-shadow 0.2s; }
        
        /* 滑鼠懸停動畫效果 */
        .card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); background: #e2e8f0; }
        
        footer { margin-top: 50px; padding: 20px; font-size: 0.9rem; color: #666; background: #e2e8f0; }
    </style>
</head>
<body>

    <header>
        <h1>新世紀領導人才培育營</h1>
        <p>南區進階課程網站</p>
    </header>

    <div class="container">
        <!-- 點選方塊區域 -->
        <div class="grid">
            <a href="#" class="card">📜 營期規範</a>
            <a href="#" class="card">📰 每日營刊</a>
            <a href="#" class="card">💡 思辨任務</a>
            <a href="#" class="card">📸 相片集錦</a>
            <a href="#" class="card">💬 老師的話</a>
            <a href="#" class="card">✏️ 回饋五四三</a>
        </div>

    </div>

    <footer>
        <p>主辦單位：教育部國民及學前教育署</p>
    </footer>

</body>
</html>
