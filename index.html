<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育部高級中等學校學生新世紀領導人才第24期進階培育營</title>
    <style>
        /* 核心變更：將海報融入網頁背景 */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(11, 37, 69, 0.85), rgba(11, 37, 69, 0.95)), 
                        url('poster.jpg') no-repeat center top fixed;
            background-size: cover;
            color: #ffffff; 
            text-align: center; 
            min-height: 100vh;
        }
        
        /* 頂部半透明微光橫幅 */
        header { 
            background: rgba(19, 64, 116, 0.4); 
            backdrop-filter: blur(8px); /* 磨砂玻璃特效，讓後方海報隱約透出 */
            -webkit-backdrop-filter: blur(8px);
            padding: 50px 20px; 
            border-bottom: 4px solid #f4a261;
        }
        
        header h1 { 
            font-size: 2.6rem; 
            margin: 0; 
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }
        
        header .subtitle {
            font-size: 1.3rem;
            color: #f4a261;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
        }

        header .info-tag {
            display: inline-block;
            background-color: #e9c46a;
            color: #0b2545;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .container { 
            max-width: 1000px; 
            margin: 50px auto; 
            padding: 0 20px; 
        }
        
        /* 點選網格 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
        }
        
        /* 點選方塊：微調為科技感毛玻璃，與海報底色完美融合 */
        .card { 
            background: rgba(255, 255, 255, 0.92); 
            border: 2px solid #e9c46a;
            border-radius: 16px; 
            padding: 45px 20px; 
            text-decoration: none; 
            color: #0b2545;
            font-weight: bold; 
            font-size: 1.4rem; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        /* 滑鼠懸停效果 */
        .card:hover { 
            transform: translateY(-8px); 
            border-color: #f4a261; 
            color: #ffffff;
            background: #f4a261; /* 變成海報上的橘色 */
            box-shadow: 0 12px 25px rgba(244, 162, 97, 0.5);
        }
        
        /* 頁尾資訊欄 */
        footer { 
            margin-top: 100px; 
            padding: 35px; 
            font-size: 0.95rem; 
            color: #e2e8f0; 
            background: rgba(11, 37, 69, 0.9); 
            border-top: 1px solid rgba(255,255,255,0.1);
            line-height: 1.8;
        }
        footer span {
            color: #e9c46a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>新世紀領導人才<br>第 24 期進階培育營</h1>
        <div class="subtitle">教育部 高級中等學校學生</div>
        <div class="info-tag">南區 ｜ 115.07.06 - 07.10</div>
    </header>

    <div class="container">
        <!-- 點選方塊區域 -->
        <div class="grid">
            <a href="rules.html" class="card">📜 營期規範</a>
            <a href="journal.html" class="card">📰 每日營刊</a>
            <a href="mission.html" class="card">💡 思辨任務</a>
            <a href="photos.html" class="card">📸 相片集錦</a>
            <a href="teachers.html" class="card">💬 老師的話</a>
            <a href="feedback.html" class="card">✏️ 回饋五四三</a>
        </div>
    </div>

    <footer>
        <p>【主辦單位】 教育部國民及學前教育署</p>
        <p>【承辦單位】 南區 - <span>國立竹山高級中學</span></p>
    </footer>

</body>
</html>
