<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日營刊&任務</title>
    <style>
        /* 全域重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0b2341; /* 延續原本的深藍背景色 */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 1100px; /* 🚀 優化：放寬最大寬度，讓左右並排有足夠空間撐開 A4 卡片 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁首標題區 */
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .video-icon {
            font-size: 1.8rem;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #b0c4de;
            letter-spacing: 1px;
        }

        /* 提示文字區 */
        .tip-section {
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
            color: #ebb856; /* 延續原圖金黃色提示字 */
            letter-spacing: 0.5px;
        }

        /* 下方返回按鈕區域 */
        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
            clear: both;      
            margin-top: 40px; /* 增加上方緩衝距離 */
        }

        /* 「← 返回首頁」按鈕 */
        .btn-back {
            background-color: #ebb856; 
            color: #000000; 
            text-decoration: none;
            padding: 10px 45px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- 頁首標題區 -->
        <header class="header-section">
            <h1 class="main-title"><span class="video-icon">📖</span> 每日營刊&任務</h1>
            <p class="subtitle">第 24 期進階領培營 每日反思</p>
        </header>

        <!-- 提示文字區 -->
        <div class="tip-section">
            <p>💡 提示：點擊下方各天方塊即可觀看相對應的每日營刊與任務。</p>
        </div>

        <!-- 1大(左) + 4小(右2x2) 圖片方塊總合區區塊 -->
        <div class="video-grid-wrapper" style="width: 100%;">
            <style>
                /* 🚀 核心排版：將整個區塊改為「三欄佈局」
                   第一欄(左側大方塊) 佔 1.25 比例，後兩欄(右側四個小方塊) 各佔 1 比例 
                */
                .video-grid {
                    width: 100%;
                    margin: 0 auto;
                    display: grid;
                    grid-template-columns: 1.25fr 1fr 1fr; 
                    gap: 24px; /* 卡片水平與垂直間距 */
                }

                /* 🚀 關鍵改動：讓總營刊大方塊「獨立在左側」，並垂直跨越兩列來與右邊 2x2 對齊 */
                .featured-row {
                    grid-column: 1;       /* 固定在第 1 欄 */
                    grid-row: span 2;     /* 垂直向下跨越 2 列 */
                    height: 100%;         /* 高度撐滿 */
                }

                /* 🚀 針對大方塊內部 A4 容器特別調整：右側 2x2 因為有兩個天數的文字標題與間距，
                   大方塊需要取消固定的 padding-top 比例，改用 flex 彈性拉伸，才能跟右邊四個小方塊完美對齊等高 
                */
                .featured-row .image-container {
                    flex: 1;
                    padding-top: 0;
                    height: 100%;
                }

                /* 卡片主體：純白底色 + 金黃色實心粗邊框 */
                .album-card-v2 {
                    display: flex;
                    flex-direction: column;
                    background-color: #ffffff;
                    border: 4px solid #ebb856; /* 複刻原圖金黃邊框 */
                    border-radius: 16px;
                    padding: 16px;
                    gap: 12px;
                    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                    text-decoration: none; /* 移除超連結底線 */
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                }

                /* 懸停滑鼠時的微動特效 */
                .album-card-v2:hover {
                    transform: translateY(-3px);
                    box-shadow: 0 6px 20px rgba(235, 184, 86, 0.3);
                }

                /* 卡片頂端：天數與日期文字列 */
                .card-top-info {
                    display: flex;
                    align-items: center;
                    color: #001833; /* 原圖深藍黑色文字 */
                    font-size: 1.2rem;
                    font-weight: bold;
                    border-bottom: 1px dashed #dddddd; /* 虛線分隔線 */
                    padding-bottom: 8px;
                    white-space: nowrap;
                }

                .calendar-icon {
                    font-size: 1.2rem;
                    margin-right: 10px;
                }

                .day-text {
                    margin-right: 10px;
                }

                .divider {
                    color: #001833;
                    margin-right: 10px;
                    opacity: 0.8;
                }

                .date-text {
                    letter-spacing: 0.5px;
                }

                /* 卡片下方：鎖定 A4 直式比例的圖片容器 */
                .image-container {
                    width: 100%;
                    position: relative;
                    padding-top: 141.42%; /* A4 直式黃金比例 (高寬比 1.414 : 1) */
                    height: 0;
                    overflow: hidden;
                    border-radius: 8px;
                }

                .image-container img {
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    object-fit: cover; /* 確保您的 A4 圖片填滿且不變形 */
                    background-color: #f5f5f5;
                }

                /* 🚀 RWD 手機版自動流暢切換：窄螢幕時改回單欄，符合移動裝置體驗 */
                @media (max-width: 800px) {
                    .video-grid {
                        grid-template-columns: 1fr; /* 全都變成單欄 */
                        gap: 20px;
                    }
                    .featured-row {
                        grid-column: span 1;
                        grid-row: span 1;
                    }
                    /* 手機版還原大方塊的 A4 比例，防高度扁塌 */
                    .featured-row .image-container {
                        padding-top: 141.42%;
                        height: 0;
                    }
                }
            </style>

            <main class="video-grid">
                
                <!-- 1. 左邊跨列大格：總營刊 -->
                <a href="您的總回顧影片網址" target="_blank" class="album-card-v2 featured-row">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">總營刊</span>
                        <span class="divider"> </span>
                        <span class="date-text"> </span>
                    </div>
                    <div class="image-container">
                        <img src="cover_all.jpg" alt="總回顧影片封面">
                    </div>
                </a>

                <!-- 2. 右邊 2x2：第一天 -->
                <a href="您的第一天影片網址" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">第一天</span>
                        <span class="divider">|</span>
                        <span class="date-text">07 / 06</span>
                    </div>
                    <div class="image-container">
                        <img src="cover1.jpg" alt="第一天回顧封面">
                    </div>
                </a>

                <!-- 3. 右邊 2x2：第二天 -->
                <a href="您的第二天影片網址" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">第二天</span>
                        <span class="divider">|</span>
                        <span class="date-text">07 / 07</span>
                    </div>
                    <div class="image-container">
                        <img src="cover2.jpg" alt="第二天回顧封面">
                    </div>
                </a>

                <!-- 4. 右邊 2x2：第三天 -->
                <a href="您的第三天影片網址" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">第三天</span>
                        <span class="divider">|</span>
                        <span class="date-text">07 / 08</span>
                    </div>
                    <div class="image-container">
                        <img src="cover3.jpg" alt="第三天回顧封面">
                    </div>
                </a>

                <!-- 5. 右邊 2x2：第四天 -->
                <a href="您的第四天影片網址" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">第四天</span>
                        <span class="divider">|</span>
                        <span class="date-text">07 / 09</span>
                    </div>
                    <div class="image-container">
                        <img src="cover4.jpg" alt="第四天回顧封面">
                    </div>
                </a>

            </main>
        </div>

        <!-- 下方返回首頁按鈕 -->
        <footer class="footer-area">
            <a href="index.html" class="btn-back">← 返回首頁</a>
        </footer>
    </div>

</body>
</html>
