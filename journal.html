<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日營刊&任務</title>
    <style>
        /* 全域重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0b2341; /* 延續原本的深藍背景色 */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 1150px; /* 🚀 優化最大寬度：讓 4 欄並排時的 A4 尺寸最舒適精緻 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁首標題區 */
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .video-icon {
            font-size: 1.8rem;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #b0c4de;
            letter-spacing: 1px;
        }

        /* 提示文字區 */
        .tip-section {
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
            color: #ebb856; 
            letter-spacing: 0.5px;
        }

        /* 下方返回按鈕區域 */
        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
            clear: both;      
            margin-top: 50px; 
        }

        /* 「← 返回首頁」按鈕 */
        .btn-back {
            background-color: #ebb856; 
            color: #000000; 
            text-decoration: none;
            padding: 10px 45px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- 頁首標題區 -->
        <header class="header-section">
            <h1 class="main-title"><span class="video-icon">📖</span> 每日營刊&任務</h1>
            <p class="subtitle">第 24 期進階領培營 每日反思</p>
        </header>

        <!-- 提示文字區 -->
        <div class="tip-section">
            <p>💡 提示：點擊下方各天方塊即可觀看相對應的每日營刊與任務。</p>
        </div>

        <!-- 4欄水平並排區塊 -->
        <div class="video-grid-wrapper" style="width: 100%;">
            <style>
                /* 🚀 核心排版：將網格軌道直接設定為均分 4 欄 (repeat(4, 1fr))
                   四個卡片完全平起平坐，完美填滿一整排 
                */
                .video-grid {
                    width: 100%;
                    margin: 0 auto;
                    display: grid;
                    grid-template-columns: repeat(4, 1fr); 
                    gap: 20px; /* 調整卡片彼此之間的水平間距 */
                    align-items: start;
                }

                /* 卡片主體：純白底色 + 金黃色實心粗邊框 */
                .album-card-v2 {
                    display: flex;
                    flex-direction: column;
                    background-color: #ffffff;
                    border: 4px solid #ebb856; 
                    border-radius: 16px;
                    padding: 16px;
                    gap: 12px;
                    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                    text-decoration: none; 
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                }

                .album-card-v2:hover {
                    transform: translateY(-3px);
                    box-shadow: 0 6px 20px rgba(235, 184, 86, 0.3);
                }

                /* 卡片頂端：天數與日期文字列 */
                .card-top-info {
                    display: flex;
                    align-items: center;
                    color: #001833; 
                    font-size: 1.15rem; /* 稍微縮小字體防止 4 欄時文字被過度擠壓 */
                    font-weight: bold;
                    border-bottom: 1px dashed #dddddd; 
                    padding-bottom: 8px;
                    white-space: nowrap;
                }

                .calendar-icon {
                    font-size: 1.1rem;
                    margin-right: 6px;
                }

                .day-text {
                    margin-right: 6px;
                }

                .divider {
                    color: #001833;
                    margin-right: 6px;
                    opacity: 0.8;
                }

                .date-text {
                    letter-spacing: 0.5px;
                }

                /* 🚀 核心比例鎖定：所有封面全部精準鎖定 1:1.414 的 A4 直式比例 */
                .image-container {
                    width: 100%;
                    position: relative;
                    padding-top: 141.42%; 
                    height: 0;
                    overflow: hidden;
                    border-radius: 8px;
                }

                .image-container img {
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    object-fit: cover; 
                    background-color: #f5f5f5;
                }

                /* 🚀 RWD 行動裝置化排版 
                   當螢幕縮小到平版或手機時，4 欄橫排會被擠扁，此時自動切換為優雅的 2x2 排列
                */
                @media (max-width: 900px) {
                    .video-grid {
                        grid-template-columns: repeat(2, 1fr); /* 平版或小螢幕切換成 2x2 */
                        gap: 24px;
                    }
                }

                /* 當螢幕在極小手機（小於550px）時，切換為全單欄排列 */
                @media (max-width: 550px) {
                    .video-grid {
                        grid-template-columns: 1fr; /* 手機切換成單行直立 */
                        gap: 20px;
                    }
                }
            </style>

            <main class="video-grid">
                
                <!-- 1. 總營刊 -->
                <a href="journal0.pdf" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">總營刊</span>
                        <span class="divider"> </span>
                        <span class="date-text"> </span>
                    </div>
                    <div class="image-container">
                        <img src="journal0.jpg" alt="總回顧影片封面">
                    </div>
                </a>

                <!-- 2. 第一天 -->
                <a href="journal1.pdf" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">第一天</span>
                        <span class="divider">|</span>
                        <span class="date-text">07 / 06</span>
                    </div>
                    <div class="image-container">
                        <img src="journal1.jpg" alt="第一天回顧封面">
                    </div>
                </a>

                <!-- 3. 第二天 -->
                <a href="journal2.pdf" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">第二天</span>
                        <span class="divider">|</span>
                        <span class="date-text">07 / 07</span>
                    </div>
                    <div class="image-container">
                        <img src="journal2.jpg" alt="第二天回顧封面">
                    </div>
                </a>

                <!-- 4. 第三天 -->
                <a href="journal3.pdf" target="_blank" class="album-card-v2">
                    <div class="card-top-info">
                        <span class="calendar-icon">📅</span>
                        <span class="day-text">第三天</span>
                        <span class="divider">|</span>
                        <span class="date-text">07 / 08</span>
                    </div>
                    <div class="image-container">
                        <img src="journal3.jpg" alt="第三天回顧封面">
                    </div>
                </a>

            </main>
        </div>

        <!-- 下方返回首頁按鈕 -->
        <footer class="footer-area">
            <a href="index.html" class="btn-back">← 返回首頁</a>
        </footer>
    </div>

</body>
</html>
