<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回顧影片</title>
    <style>
        /* 全域重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0b2341; /* 延續原本的深藍背景色 */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 900px; /* 稍微放大最大寬度，讓 2x2 的 A4 直式方塊有更好的視覺伸展空間 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁首標題區 */
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .video-icon {
            font-size: 1.8rem;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #b0c4de;
            letter-spacing: 1px;
        }

        /* 提示文字區 */
        .tip-section {
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
            color: #ebb856; /* 延續原圖金黃色提示字 */
            letter-spacing: 0.5px;
        }

        /* 核心 2x2 格線排版 */
        .video-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 完美的 2 欄排列 */
            gap: 30px; /* 圖片方塊之間的間距 */
            margin-bottom: 45px;
        }

        /* 單個卡片方塊：純白底色 + 金黃色實心粗邊框 */
        .image-card {
            background-color: #ffffff;
            border: 4px solid #ebb856; /* 完全複刻原圖卡片的金黃邊框 */
            border-radius: 16px;       /* 完全複刻原圖卡片的圓角 */
            padding: 12px;             /* 內襯間距，凸顯白底層次 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            
            /* 關鍵：利用 CSS padding 技巧，鎖定 A4 直式比例（寬高比 1 : 1.414） */
            position: relative;
            padding-top: calc(141.42% - 24px); 
            height: 0;
            overflow: hidden;
        }

        /* 嵌入封面圖片的自適應控制 */
        .image-card img {
            position: absolute;
            top: 12px;
            left: 12px;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            border-radius: 8px; /* 圖片微圓角 */
            object-fit: cover;  /* 確保圖片填滿格線且不變形 */
            background-color: #f5f5f5; /* 圖片載入前的淡底色 */
        }

        /* 下方返回按鈕區域 */
        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* 「← 返回首頁」按鈕：完全遵照原圖 */
        .btn-back {
            background-color: #ebb856; 
            color: #000000; 
            text-decoration: none;
            padding: 10px 45px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
        }

        /* 行動裝置響應式優化：若螢幕太小自動改為單欄，避免 A4 方塊縮得太小 */
        @media (max-width: 600px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- 頁首標題區 -->
        <header class="header-section">
            <h1 class="main-title"><span class="video-icon">🎬</span> 回顧影片</h1>
            <p class="subtitle">第 24 期進階領導營 精彩紀錄</p>
        </header>

        <!-- 提示文字區 -->
        <div class="tip-section">
            <p>💡 提示：點擊下方封面即可觀看相對應的精彩回顧影片。</p>
        </div>

        <!-- 2x2 圖片方塊區 -->
        <main class="video-grid">
            <!-- 第一格 -->
            <div class="image-card">
                <!-- 🛠️ 請把 src="cover1.jpg" 換成您實際的 A4 圖片檔名或路徑 -->
                <img src="cover1.jpg" alt="影片封面 1">
            </div>

            <!-- 第二格 -->
            <div class="image-card">
                <!-- 🛠️ 請把 src="cover2.jpg" 換成您實際的 A4 圖片檔名或路徑 -->
                <img src="cover2.jpg" alt="影片封面 2">
            </div>

            <!-- 第三格 -->
            <div class="image-card">
                <!-- 🛠️ 請把 src="cover3.jpg" 換成您實際的 A4 圖片檔名或路徑 -->
                <img src="cover3.jpg" alt="影片封面 3">
            </div>

            <!-- 第四格 -->
            <div class="image-card">
                <!-- 🛠️ 請把 src="cover4.jpg" 換成您實際的 A4 圖片檔名或路徑 -->
                <img src="cover4.jpg" alt="影片封面 4">
            </div>
        </main>

        <!-- 下方返回首頁按鈕 -->
        <footer class="footer-area">
            <a href="index.html" class="btn-back">← 返回首頁</a>
        </footer>
    </div>

</body>
</html>
