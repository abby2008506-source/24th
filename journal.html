<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日營刊&任務</title>
    <style>
        /* 全域重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0b2341; /* 延續原本的深藍背景色 */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 720px; /* 縮小網頁整體最大寬度，防方塊過大 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁首標題區 */
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .video-icon {
            font-size: 1.8rem;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #b0c4de;
            letter-spacing: 1px;
        }

        /* 提示文字區 */
        .tip-section {
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
            color: #ebb856; /* 延續原圖金黃色提示字 */
            letter-spacing: 0.5px;
        }

        /* 2x2 格線排版 */
        .video-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px; /* 調緊方塊間距 */
            margin-bottom: 60x;
        }

        /* 卡片主體：純白底色 + 金黃色實心粗邊框 */
        .album-card-v2 {
            background-color: #ffffff;
            border: 4px solid #ebb856; /* 複刻原圖金黃邊框 */
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column; /* 改為上下排列，上方放文字、下方放圖片 */
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* 卡片上方：完美還原原本的天數與日期列 */
        .card-top-info {
            display: flex;
            align-items: center;
            color: #001833; /* 原圖深藍黑色文字 */
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px dashed #dddddd; /* 加上淡淡的分隔線，增加精緻感 */
            padding-bottom: 8px;
        }

        .calendar-icon {
            font-size: 1.2rem;
            margin-right: 10px;
        }

        .day-text {
            margin-right: 10px;
        }

        .divider {
            color: #001833;
            margin-right: 10px;
            opacity: 0.8;
        }

        .date-text {
            letter-spacing: 0.5px;
        }

        /* 卡片下方：A4 比例的封面圖片容器（等比例縮小版） */
        .image-container {
            width: 100%;
            position: relative;
            /* 鎖定 A4 直式比例 (寬高比 1 : 1.414) */
            padding-top: 141.42%; 
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保 A4 圖片不變形且完美填滿 */
            background-color: #f5f5f5;
        }

        /* 下方返回按鈕區域 */
        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
            clear: both;      /* 關鍵：防止與浮動或格線元素重疊 */
            margin-top: 20px; /* 加上與上方卡片的緩衝距離 */
        }

        /* 「← 返回首頁」按鈕 */
        .btn-back {
            background-color: #ebb856; 
            color: #000000; 
            text-decoration: none;
            padding: 10px 45px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
        }

        /* 手機版自動切換為單欄排列，避免 A4 方塊在窄螢幕擠壓變形 */
        @media (max-width: 550px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- 頁首標題區 -->
        <header class="header-section">
            <h1 class="main-title"><span class="video-icon">📖</span> 每日營刊&任務</h1>
            <p class="subtitle">第 24 期進階領培營 每日反思</p>
        </header>

        <!-- 提示文字區 -->
        <div class="tip-section">
            <p>💡 提示：點擊下方各天方塊即可觀看相對應的每日營刊與任務。</p>
        </div>

<!-- 1大 + 下方2x2 圖片方塊總合區區塊 -->
<div class="video-grid-wrapper">
    <style>
        /* 核心網格排版 */
        .video-grid {
            width: 100%;
            max-width: 720px; /* 限制寬度，確保 A4 直式方塊不會過大 */
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 標準 2 欄排列 */
            gap: 24px; /* 卡片水平與垂直間距 */
        }

        /* 讓最上方第一格（總回顧）橫跨兩欄滿版 */
        .featured-row {
            grid-column: span 2; 
        }

        /* 卡片主體：純白底色 + 金黃色實心粗邊框 */
        .album-card-v2 {
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border: 4px solid #ebb856; /* 複刻原圖金黃邊框 */
            border-radius: 16px;
            padding: 16px;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-decoration: none; /* 移除超連結底線 */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* 懸停滑鼠時的微動特效 */
        .album-card-v2:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(235, 184, 86, 0.3);
        }

        /* 卡片頂端：天數與日期文字列 */
        .card-top-info {
            display: flex;
            align-items: center;
            color: #001833; /* 原圖深藍黑色文字 */
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px dashed #dddddd; /* 虛線分隔線 */
            padding-bottom: 8px;
            white-space: nowrap;
        }

        .calendar-icon {
            font-size: 1.2rem;
            margin-right: 10px;
        }

        .day-text {
            margin-right: 10px;
        }

        .divider {
            color: #001833;
            margin-right: 10px;
            opacity: 0.8;
        }

        .date-text {
            letter-spacing: 0.5px;
        }

        /* 卡片下方：鎖定 A4 直式比例的圖片容器 */
        .image-container {
            width: 100%;
            position: relative;
            padding-top: 141.42%; /* A4 直式黃金比例 (高寬比 1.414 : 1) */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保您的 A4 圖片填滿且不變形 */
            background-color: #f5f5f5;
        }

        /* 手機版自動切換為單欄排列，防止寬度被過度擠壓 */
        @media (max-width: 550px) {
            .video-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .featured-row {
                grid-column: span 1;
            }
        }
    </style>

    <main class="video-grid">
        
        <!-- 1. 最上方滿版大格：總回顧 -->
        <a href="您的總回顧影片網址" target="_blank" class="album-card-v2 featured-row">
            <div class="card-top-info">
                <span class="calendar-icon">📅</span>
                <span class="day-text">總營刊</span>
                <span class="divider"> </span>
                <span class="date-text"> </span>
            </div>
            <div class="image-container">
                <img src="cover_all.jpg" alt="總回顧影片封面">
            </div>
        </a>

        <!-- 2. 下方 2x2 格線：第一天 -->
        <a href="您的第一天影片網址" target="_blank" class="album-card-v2">
            <div class="card-top-info">
                <span class="calendar-icon">📅</span>
                <span class="day-text">第一天</span>
                <span class="divider">|</span>
                <span class="date-text">07 / 06</span>
            </div>
            <div class="image-container">
                <img src="cover1.jpg" alt="第一天回顧封面">
            </div>
        </a>

        <!-- 3. 下方 2x2 格線：第二天 -->
        <a href="您的第二天影片網址" target="_blank" class="album-card-v2">
            <div class="card-top-info">
                <span class="calendar-icon">📅</span>
                <span class="day-text">第二天</span>
                <span class="divider">|</span>
                <span class="date-text">07 / 07</span>
            </div>
            <div class="image-container">
                <img src="cover2.jpg" alt="第二天回顧封面">
            </div>
        </a>

        <!-- 4. 下方 2x2 格線：第三天 -->
        <a href="您的第三天影片網址" target="_blank" class="album-card-v2">
            <div class="card-top-info">
                <span class="calendar-icon">📅</span>
                <span class="day-text">第三天</span>
                <span class="divider">|</span>
                <span class="date-text">07 / 08</span>
            </div>
            <div class="image-container">
                <img src="cover3.jpg" alt="第三天回顧封面">
            </div>
        </a>

        <!-- 5. 下方 2x2 格線：第四天 -->
        <a href="您的第四天影片網址" target="_blank" class="album-card-v2">
            <div class="card-top-info">
                <span class="calendar-icon">📅</span>
                <span class="day-text">第四天</span>
                <span class="divider">|</span>
                <span class="date-text">07 / 09</span>
            </div>
            <div class="image-container">
                <img src="cover4.jpg" alt="第四天回顧封面">
            </div>
        </a>

    </main>
</div>

        <!-- 下方返回首頁按鈕 -->
        <footer class="footer-area">
            <a href="index.html" class="btn-back">← 返回首頁</a>
        </footer>
    </div>

</body>
</html>
