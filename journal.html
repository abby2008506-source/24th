<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日營刊&任務</title>
    <style>
        /* 全域重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0b2341; /* 延續原本的深藍背景色 */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 1050px; /* 🚀 縮小最大寬度，防止 A4 卡片在超大螢幕上過大 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁首標題區 */
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .video-icon {
            font-size: 1.8rem;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #b0c4de;
            letter-spacing: 1px;
        }

        /* 提示文字區 */
        .tip-section {
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
            color: #ebb856; /* 延續原圖金黃色提示字 */
            letter-spacing: 0.5px;
        }

        /* 下方返回按鈕區域 */
        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
            clear: both;      
            margin-top: 40px; 
        }

        /* 「← 返回首頁」按鈕 */
        .btn-back {
            background-color: #ebb856; 
            color: #000000; 
            text-decoration: none;
            padding: 10px 45px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- 頁首標題區 -->
        <header class="header-section">
            <h1 class="main-title"><span class="video-icon">📖</span> 每日營刊&任務</h1>
            <p class="subtitle">第 24 期進階領培營 每日反思</p>
        </header>

        <!-- 提示文字區 -->
        <div class="tip-section">
            <p>💡 提示：點擊下方各天方塊即可觀看相對應的每日營刊與任務。</p>
        </div>

        <!-- 1大(左) + 4小(右2x2) 圖片方塊總合區區塊 -->
        <div class="video-grid-wrapper" style="width: 100%;">
            <style>
                /* 🚀 核心排版：將寬度改為兩等分 (1fr 1fr)
                   左邊一個大方塊，右邊四個小方塊，這樣兩邊的寬度與基礎高度比例才能完美對稱。
                */
                .video-grid {
                    width: 100%;
                    margin: 0 auto;
                    display: grid;
                    grid-template-columns: 1fr 1fr; 
                    gap: 32px; /* 🚀 調大左右主間距，視覺上更大器 */
                    align-items: start;
                }

                /* 左側大方塊：獨立一欄，垂直跨越兩列 */
                .featured-row {
                    grid-column: 1;       
                    grid-row: span 2;     
                }

                /* 🚀 關鍵改動：右側四個小方塊的網格
                   原本直接平鋪在 main 裡面，現在我們利用 CSS 讓右側 2x2 在垂直方向上的間距（row-gap）
                   可以自動彈性伸縮，這樣即使左邊是大 A4、右邊是兩個小 A4，兩邊的「底部邊緣」也能精準對齊！
                */
                .video-grid {
                    grid-template-rows: auto auto;
                }

                /* 卡片主體：純白底色 + 金黃色實心粗邊框 */
                .album-card-v2 {
                    display: flex;
                    flex-direction: column;
                    background-color: #ffffff;
                    border: 4px solid #ebb856; 
                    border-radius: 16px;
                    padding: 16px;
                    gap: 12px;
                    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                    text-decoration: none; 
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                }

                /* 懸停滑鼠時的微動特效 */
                .album-card-v2:hover {
                    transform: translateY(-3px);
                    box-shadow: 0 6px 20px rgba(235, 184, 86, 0.3);
                }

                /* 卡片頂端：天數與日期文字列 */
                .card-top-info {
                    display: flex;
                    align-items: center;
                    color: #001833; 
                    font-size: 1.2rem;
                    font-weight: bold;
                    border-bottom: 1px dashed #dddddd; 
                    padding-bottom: 8px;
                    white-space: nowrap;
                }

                .calendar-icon {
                    font-size: 1.2rem;
                    margin-right: 10px;
                }

                .day-text {
                    margin-right: 10px;
                }

                .divider {
                    color: #001833;
                    margin-right: 10px;
                    opacity: 0.8;
                }

                .date-text {
                    letter-spacing: 0.5px;
                }

                /* 🚀 核心比例鎖定：不論大方塊或小方塊，
                   全部透過 padding-top: 141.42% 完美鎖定 A4 直式比例 (高寬比 1.414 : 1) 
                */
                .image-container {
                    width: 100%;
                    position: relative;
                    padding-top: 141.42%; 
                    height: 0;
                    overflow: hidden;
                    border-radius: 8px;
                }

                .image-container img {
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    object-fit: cover; /* 確保您的 A4 圖片完美填滿、絕不變形 */
                    background-color: #f5f5f5;
                }

                /* 🚀 右側四個小方塊在「非手機版」時，建立一個內部的 2x2 網格 */
                .small-cards-container {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 20px; /* 小方塊之間的上下左右間距 */
                }

                /* RWD 手機版自動流暢切換 */
                @media (max-width: 800px) {
                    .video-grid {
                        grid-template-columns: 1fr; /* 全都變成單欄 */
                        gap: 20px;
                    }
                    .small-cards-container {
                        grid-template-columns: 1fr; /* 右邊四個在手機版也變單欄 */
                        gap: 20px;
                    }
                }
            </style>

            <main class="video-grid">
                
                <!-- 1. 左邊：總營刊 (維持獨立大 A4 比例) -->
                <div class="featured-row">
                    <a href="您的總回顧影片網址" target="_blank" class="album-card-v2">
                        <div class="card-top-info">
                            <span class="calendar-icon">📅</span>
                            <span class="day-text">總營刊</span>
                            <span class="divider"> </span>
                            <span class="date-text"> </span>
                        </div>
                        <div class="image-container">
                            <img src="cover_all.jpg" alt="總回顧影片封面">
                        </div>
                    </a>
                </div>

                <!-- ➡️ 右邊：包覆四個小方塊的 2x2 區域 -->
                <div class="small-cards-container">
                    <!-- 2. 第一天 -->
                    <a href="您的第一天影片網址" target="_blank" class="album-card-v2">
                        <div class="card-top-info">
                            <span class="calendar-icon">📅</span>
                            <span class="day-text">第一天</span>
                            <span class="divider">|</span>
                            <span class="date-text">07 / 06</span>
                        </div>
                        <div class="image-container">
                            <img src="cover1.jpg" alt="第一天回顧封面">
                        </div>
                    </a>

                    <!-- 3. 第二天 -->
                    <a href="您的第二天影片網址" target="_blank" class="album-card-v2">
                        <div class="card-top-info">
                            <span class="calendar-icon">📅</span>
                            <span class="day-text">第二天</span>
                            <span class="divider">|</span>
                            <span class="date-text">07 / 07</span>
                        </div>
                        <div class="image-container">
                            <img src="cover2.jpg" alt="第二天回顧封面">
                        </div>
                    </a>

                    <!-- 4. 第三天 -->
                    <a href="您的第三天影片網址" target="_blank" class="album-card-v2">
                        <div class="card-top-info">
                            <span class="calendar-icon">📅</span>
                            <span class="day-text">第三天</span>
                            <span class="divider">|</span>
                            <span class="date-text">07 / 08</span>
                        </div>
                        <div class="image-container">
                            <img src="cover3.jpg" alt="第三天回顧封面">
                        </div>
                    </a>

                    <!-- 5. 第四天 -->
                    <a href="您的第四天影片網址" target="_blank" class="album-card-v2">
                        <div class="card-top-info">
                            <span class="calendar-icon">📅</span>
                            <span class="day-text">第四天</span>
                            <span class="divider">|</span>
                            <span class="date-text">07 / 09</span>
                        </div>
                        <div class="image-container">
