<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回顧影片</title>
    <style>
        /* 全域重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #0b2341; /* 延續原本的深藍背景色 */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-container {
            width: 100%;
            max-width: 820px; /* 保持與原圖相同的滿版寬度比例 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頁首標題區 */
        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .main-title {
            font-size: 2.2rem;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .video-icon {
            font-size: 1.8rem;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #b0c4de;
            letter-spacing: 1px;
        }

        /* 提示文字區 */
        .tip-section {
            text-align: center;
            margin-bottom: 35px;
            font-size: 0.95rem;
            color: #ebb856; /* 延續原圖金黃色提示字 */
            letter-spacing: 0.5px;
        }

        /* 影片播放容器區塊 */
        .video-container {
            width: 100%;
            background-color: #ffffff;
            border: 4px solid #ebb856; /* 完全複刻原圖卡片的金黃邊框 */
            border-radius: 16px;       /* 完全複刻原圖卡片的圓角 */
            padding: 12px;             /* 讓影片與外框保持適當間距，凸顯底色質感 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 45px;
            
            /* 保持 16:9 黃金比例的自適應排版 */
            position: relative;
            padding-top: calc(56.25% + 12px); 
            height: 0;
            overflow: hidden;
        }

        /* 實際影片標籤或內嵌框架的滿版控制 */
        .video-container video,
        .video-container iframe {
            position: absolute;
            top: 12px;
            left: 12px;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            border-radius: 8px; /* 影片本身微圓角 */
            background-color: #000000; /* 載入前的背景黑色 */
            border: none;
        }

        /* 下方返回按鈕區域 */
        .footer-area {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* 「← 返回首頁」按鈕：與原圖完全一致 */
        .btn-back {
            background-color: #ebb856; /* 柔和金黃色 */
            color: #000000; /* 全黑純文字 */
            text-decoration: none;
            padding: 10px 45px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            transition: background-color 0.2s;
        }

        .btn-back:hover {
            background-color: #d8aa46;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- 頁首標題區 -->
        <header class="header-section">
            <h1 class="main-title"><span class="video-icon">🎬</span> 回顧影片</h1>
            <p class="subtitle">第 24 期進階領導營 精彩紀錄</p>
        </header>

        <!-- 提示文字區 -->
        <div class="tip-section">
            <p>💡 提示：點擊影片中央的播放按鈕，即可直接觀看營隊回顧紀錄。</p>
        </div>

        <!-- 影片播放區（已適應手機與電腦螢幕，保持 16:9 不變形） -->
        <div class="video-container">
            <iframe src="https://youtu.be.com/t4O6N0JaDew?si=urf8TO2nxhdZwuGQ" allowfullscreen></iframe> 
        </div>

        <!-- 下方返回首頁按鈕 -->
        <footer class="footer-area">
            <a href="index.html" class="btn-back">← 返回首頁</a>
        </footer>
    </div>

</body>
</html>
