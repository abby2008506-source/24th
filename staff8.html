<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳宜君 (布丁) - 個人簡介</title>
    <style>
        /* 全域重設與背景設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #0b1d3a; /* 保留原本的深藍底色 */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* --- 新增的幾何色塊設計 --- */
        body::before {
            content: "";
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            clip-path: polygon(20% 0%, 100% 0%, 100% 80%, 0% 100%);
            z-index: 1;
            opacity: 0.6;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -5%;
            left: -5%;
            width: 40vw;
            height: 40vw;
            background: linear-gradient(45deg, #11305e, #1a427a);
            clip-path: cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            z-index: 1;
            opacity: 0.5;
        }

        /* 主要內容容器 */
        .container {
            width: 80%;
            max-width: 900px;
            margin: 40px auto;
            position: relative;
            z-index: 2; /* 確保內容在色塊上方 */
        }

        /* 頂部標題區塊 */
        .header-section {
            border-left: 6px solid #f39c12; /* 原本的金黃色直條 */
            padding-left: 20px;
            margin-bottom: 40px;
        }

        .name-title {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 0 0 10px 0;
        }

        .name-title span {
            font-size: 1.4rem;
            color: #bdc3c7;
            margin-left: 10px;
        }

        .sub-title {
            font-size: 1.2rem;
            color: #f39c12;
            margin: 0;
        }

        /* 資訊卡片區塊（優化為微磨砂玻璃質感） */
        .info-card {
            background: rgba(14, 34, 61, 0.75); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px); /* 讓背景色塊透上來時帶有模糊美感 */
        }

        /* 列表項目樣式 */
        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            font-size: 1.15rem;
            line-height: 1.8;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        /* 項目圖示與標籤 */
        .item-label {
            display: flex;
            align-items: center;
            min-width: 120px;
            font-weight: bold;
            color: #ffffff;
        }

        .item-icon {
            color: #e74c3c; /* 紅色小圖示 */
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* 項目內容文字 */
        .item-content {
            color: #ecf0f1;
            flex: 1;
        }

        /* 底部按鈕區塊 */
        .button-section {
            text-align: center;
            margin-top: 40px;
        }

        .btn-back {
            display: inline-block;
            background-color: #16a085;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(22, 160, 133, 0.3);
        }

        .btn-back:hover {
            background-color: #1abc9c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 188, 156, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頂部標題區塊 -->
        <header class="header-section">
            <h1 class="name-title">陳宜君 <span>（布丁）</span></h1>
            <p class="sub-title">淡江大學 英文系全英文學士班</p>
        </header>

        <!-- 資訊卡片區塊 -->
        <main class="info-card">
            <!-- 人格特質 -->
            <div class="info-item">
                <div class="item-label">
                    <span class="item-icon">📌</span>
                    <span>人格特質</span>
                </div>
                <div class="item-content">ㄅㄧㄤˋ、大剌剌、好相處</div>
            </div>

            <!-- 興趣 -->
            <div class="info-item">
                <div class="item-label">
                    <span class="item-icon">📌</span>
                    <span>興趣</span>
                </div>
                <div class="item-content">籃球、唱歌、畫畫、研究星座</div>
            </div>

            <!-- 專長 -->
            <div class="info-item">
                <div class="item-label">
                    <span class="item-icon">📌</span>
                    <span>專長</span>
                </div>
                <div class="item-content">腿特長（誤）、籃球、唱歌、畫畫</div>
            </div>
        </main>

        <!-- 返回按鈕 -->
        <footer class="button-section">
            <a href="#" class="btn-back">← 返回首頁</a>
        </footer>
    </div>

</body>
</html>
