<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陳宜君的個人簡介</title>
    <style>
        :root {
            --bg-color: #0b1528;
            --card-bg: rgba(20, 35, 65, 0.75);
            --orange-primary: #ff7a00;
            --orange-light: #ff9f43;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden; /* 防止手機版左右滑動破版 */
            padding: 80px 20px 40px 20px; /* 留出頂部按鈕空間 */
        }

        /* 背景橘色方塊（已減量，僅保留點綴） */
        .bg-decorations {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .cube {
            position: absolute;
            background: linear-gradient(135deg, var(--orange-primary), var(--orange-light));
            border-radius: 16px;
            opacity: 0.12;
        }

        /* 僅保留兩個對角方塊，避免畫面太雜亂 */
        .cube-1 { width: 140px; height: 140px; top: 8%; left: -40px; transform: rotate(15deg); }
        .cube-2 { width: 220px; height: 220px; bottom: -60px; right: -40px; transform: rotate(35deg); opacity: 0.08; }

        /* 回到首頁按鍵 */
        .home-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 122, 0, 0.4);
            border-radius: 30px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .home-btn:hover {
            background-color: var(--orange-primary);
            border-color: var(--orange-primary);
            box-shadow: 0 0 15px rgba(255, 122, 0, 0.4);
            transform: translateY(-2px);
        }

        /* 主容器佈局 */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1050px;
            display: flex;
            flex-direction: row; /* 電腦版橫向排列 */
            gap: 50px;
            align-items: center;
            justify-content: center;
        }

        /* 左側：個人形象與基本資料 */
        .profile-side {
            flex: 0 0 280px; /* 固定寬度，防止壓縮 */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .image-container {
            width: 100%;
            max-width: 260px;
            aspect-ratio: 4 / 5; /* 鎖定照片比例，手機上不變形 */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 122, 0, 0.25);
            background-color: #152238;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保 staff8.jpg 自動裁剪不拉伸 */
        }

        .profile-name {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
            white-space: nowrap; /* 防止名字斷行 */
        }

        .profile-nickname {
            font-size: 18px;
            color: var(--orange-light);
            font-weight: 500;
            margin-left: 5px;
        }

        .school-info {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* 右側：詳細內容卡片 */
        .info-side {
            flex: 1; /* 自動填滿剩餘空間 */
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .info-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 22px 25px;
            border-left: 5px solid var(--orange-primary);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .card-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 100px;
            color: var(--orange-light);
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0; /* 防止標籤被文字擠壓變形 */
        }

        .card-content {
            font-size: 17px;
            color: #e2e8f0;
            line-height: 1.5;
            word-break: break-all; /* 防止長文字撐破手機版面 */
        }

        .wrong-text {
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: line-through;
            margin-right: 5px;
        }

        /* 📱 關鍵手機版 RWD 完美防跑版設定 */
        @media (max-width: 768px) {
            body {
                padding: 90px 16px 30px 16px; /* 縮小手機版內邊距 */
            }

            .home-btn {
                top: 20px;
                left: 16px;
                padding: 8px 14px;
                font-size: 13px;
            }

            .container {
                flex-direction: column; /* 手機版切換為「上下垂直排列」 */
                gap: 30px;
            }

            .profile-side {
                flex: none;
                width: 100%; /* 手機版滿寬 */
            }

            .image-container {
                max-width: 220px; /* 手機上微調縮小照片，更符合螢幕比例 */
            }

            .profile-name {
                font-size: 30px; /* 手機版名字稍微縮小防止溢出 */
            }

            .info-side {
                gap: 12px;
            }

            .info-card {
                flex-direction: column; /* 卡片內部在手機上也改為上下排 */
                align-items: flex-start;
                gap: 8px;
                padding: 16px 20px;
            }

            .card-tag {
                min-width: auto;
            }

            .card-content {
                font-size: 15px; /* 手機內文字級調整 */
            }
        }
    </style>
</head>
<body>

    <!-- 背景裝飾橘色方塊（已精簡至 2 個） -->
    <div class="bg-decorations">
        <div class="cube cube-1"></div>
        <div class="cube cube-2"></div>
    </div>

    <!-- 回到首頁按鈕 -->
    <a href="index.html" class="home-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        回到首頁
    </a>

    <!-- 主要內容區塊 -->
    <div class="container">
        
        <!-- 左側基本資料 -->
        <div class="profile-side">
            <div class="image-container">
                <img src="staff8.jpg" alt="陳宜君的個人照片" class="profile-img">
            </div>
            <div class="profile-name-box">
                <h1 class="profile-name">陳宜君<span class="profile-nickname">（布丁）</span></h1>
            </div>
            <div class="school-info">
                <p>淡江大學</p>
                <p>英文學系全英文學士班</p>
            </div>
        </div>

        <!-- 右側核心特質 -->
        <div class="info-side">
            
            <!-- 人格特質 -->
            <div class="info-card">
                <div class="card-tag">
                    <span>⚡</span>
                    <span>人格特質</span>
                </div>
                <div class="card-content">
                    ㄅ一ㄤˋ、大刺刺、好相處
                </div>
            </div>

            <!-- 個人興趣 -->
            <div class="info-card">
                <div class="card-tag">
                    <span>✦</span>
                    <span>個人興趣</span>
                </div>
                <div class="card-content">
                    籃球、唱歌、畫畫、研究星座
                </div>
            </div>

            <!-- 專長技能 -->
            <div class="info-card">
                <div class="card-tag">
                    <span>💪</span>
                    <span>專長技能</span>
                </div>
                <div class="card-content">
                    <span class="wrong-text">腿特長 (誤)</span> 籃球、唱歌、畫畫
                </div>
            </div>

        </div>
    </div>

</body>
</html>
