<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳宜君 (布丁) - 個人簡介</title>
    <style>
        /* --- 全域重設與升級版背景設計 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "SF Pro Display", "Helvetica Neue", "Segoe UI", "Microsoft JhengHei", sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #112240 0%, #0a192f 100%);
        }

        /* 幾何線條網格背景 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* 背景發光氣泡 */
        .bg-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: 1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -5%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(26, 188, 156, 0.18) 0%, rgba(0,0,0,0) 70%);
            filter: blur(100px);
            z-index: 1;
            pointer-events: none;
        }

        /* 主容器 */
        .wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        /* 響應式雙欄布局：修改為 align-items: center 讓左右兩欄垂直置中 */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 50px;
            align-items: center; /* ✨ 確保左右兩邊上下對齊居中 */
        }

        /* --- 左側：照片與標題的組合欄位 --- */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px; 
        }

        /* 照片外框設計 */
        .avatar-container {
            width: 100%;
            max-width: 280px; 
            aspect-ratio: 1 / 1; 
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* 新增：左側橘色幾何裝飾短線 */
        .orange-divider {
            width: 60px;
            height: 4px;
            background-color: #f39c12;
            border-radius: 2px;
            margin: 5px 0;
        }

        /* 標題與文字介紹區塊 */
        .header-section {
            border-left: 6px solid #f39c12;
            padding-left: 24px;
        }

        .name-title {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .name-title span {
            font-size: 1.6rem;
            color: #a0aec0;
            font-weight: 400;
            margin-left: 8px;
        }

        .sub-title {
            font-size: 1.3rem;
            color: #f39c12;
            margin: 0;
            line-height: 1.6;
            font-weight: 500;
        }

        /* --- 右側：資訊卡片組 --- */
        .cards-group {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 單個獨立卡片 */
        .info-card {
            background: rgba(23, 42, 69, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 26px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* 新增：卡片左側的亮橘色裝飾小方塊 */
        .info-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 40%;
            background-color: #f39c12;
            border-radius: 0 4px 4px 0;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        /* 滑鼠懸停效果：優化為橘色系發光 */
        .info-card:hover {
            transform: translateY(-5px);
            background: rgba(35, 58, 92, 0.6);
            border-color: rgba(243, 156, 18, 0.5); /* 橘色邊框 */
            box-shadow: 0 15px 35px rgba(243, 156, 18, 0.15); /* 橘色光暈 */
        }

        /* 懸停時讓橘色小方塊增長變亮 */
        .info-card:hover::before {
            height: 70%;
            opacity: 1;
            box-shadow: 0 0 10px #f39c12;
        }

        /* 卡片標籤 */
        .card-tag {
            background: linear-gradient(135deg, #243b55, #141e30);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            color: #f39c12;
            white-space: nowrap;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(243, 156, 18, 0.2);
        }

        .card-tag::before {
            content: "⚡";
            font-size: 0.9rem;
        }

        /* 卡片文字 */
        .card-body {
            font-size: 1.2rem;
            color: #e2e8f0;
            line-height: 1.6;
        }

        /* 返回按鈕 */
        .button-section {
            text-align: center;
            margin-top: 60px;
        }

        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, #16a085, #1abc9c);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 45px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(22, 160, 133, 0.3);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(26, 188, 156, 0.5);
        }

        /* --- 響應式斷點設定（手機版優化） --- */
        @media (max-width: 850px) {
            body {
                align-items: flex-start;
                padding: 30px 0;
            }

            .wrapper {
                padding: 20px;
            }

            .main-layout {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            /* 手機版照片與名字置中對齊 */
            .left-column {
                align-items: center;
                text-align: center;
            }

            .avatar-container {
                max-width: 200px; 
            }

            .orange-divider {
                margin: 10px auto; /* 手機版裝飾線置中 */
            }

            .header-section {
                border-left: none; 
                padding-left: 0;
            }

            .name-title {
                font-size: 2.4rem;
            }

            .info-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 22px;
            }

            .info-card::before {
                left: 50%;
                top: 0;
                transform: translateX(-50%);
                width: 40%;
                height: 4px;
                border-radius: 0 0 4px 4px;
            }

            .info-card:hover::before {
                width: 60%;
                height: 4px;
            }

            .card-body {
                font-size: 1.1rem;
            }

            .info-card:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>

    <!-- 背景光效元件 -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="wrapper">
        <div class="main-layout">
            
            <!-- 左/上側：照片與標題組合欄位 -->
            <div class="left-column">
                <!-- 圖片區塊 -->
                <div class="avatar-container">
                    <img src="staff8.jpg" alt="陳宜君的個人照片">
                </div>
                
                <!-- 新增的橘色幾何裝飾線 -->
                <div class="orange-divider"></div>
                
                <!-- 姓名與抬頭 -->
                <header class="header-section">
                    <h1 class="name-title">陳宜君 <span>（布丁）</span></h1>
                    <p class="sub-title">淡江大學<br>英文系全英文學士班</p>
                </header>
            </div>

            <!-- 右/下側：卡片區塊 -->
            <main class="cards-group">
                
                <!-- 卡片 1 -->
                <div class="info-card">
                    <div class="card-tag">人格特質</div>
                    <div class="card-body">ㄅㄧㄤˋ、大剌剌、好相處</div>
                </div>

                <!-- 卡片 2 -->
                <div class="info-card">
                    <div class="card-tag">個人興趣</div>
                    <div class="card-body">籃球、唱歌、畫畫、研究星座</div>
                </div>

                <!-- 卡片 3 -->
                <div class="info-card">
                    <div class="card-tag">專長技能</div>
                    <div class="card-body">腿特長（誤）、籃球、唱歌、畫畫</div>
                </div>
